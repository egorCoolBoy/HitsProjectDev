services:
  frontend:
    build:
      context: ./frontend
    container_name: splitapp-frontend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: splitapp-db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backhits_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: splitapp-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: splitapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  tgbot:
    build:
      context: ./tgbot
    container_name: splitapp-tgbot
    restart: unless-stopped
    env_file:
      - ./tgbot/.env
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: splitapp_default
