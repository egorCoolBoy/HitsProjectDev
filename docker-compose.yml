services:
  frontend:
    build:
      context: ./frontend
    container_name: splitapp-frontend
    restart: unless-stopped
    ports:
      - "8081:80"

  backend:
    build:
      context: ./backend
    container_name: splitapp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"

  tgbot:
    build:
      context: ./tgbot
    container_name: splitapp-tgbot
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
