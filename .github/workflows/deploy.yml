name: Deploy Production

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: ${{ secrets.HOST_USER }}
          password: ${{ secrets.HOST_PASSWORD }}
          port: 22
          envs: POSTGRES_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_MINIAPP_URL,TELEGRAM_BOT_USERNAME

          script: |
            set -e

            echo "Pulling latest code..."
            cd /root/splitapp
            git pull origin ${{ github.ref_name }}

            echo "Writing env files from GitHub Secrets..."
            cat > backend/.env <<EOF
            POSTGRES_DB=backhits_db
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

            ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=backhits_db;Username=postgres;Password=${POSTGRES_PASSWORD}

            Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
            Telegram__BotUsername=${TELEGRAM_BOT_USERNAME}
            Telegram__InitDataMaxAgeMinutes=1440

            ASPNETCORE_ENVIRONMENT=Development
            Jwt__Key=change-this-secret-key-to-at-least-32-characters
            EOF

            cat > tgbot/.env <<EOF
            BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            TELEGRAM_MINIAPP_URL=${TELEGRAM_MINIAPP_URL}
            EOF

            echo "Rebuilding containers..."
            docker compose up -d --build

            echo "Rebuilding containers..."
            docker compose up -d --build
            
            echo "Waiting for services to be healthy..."
            sleep 10
            
            echo "Checking containers..."
            docker compose ps
            
            if docker compose ps | grep -E "Exited|Restarting"; then
              echo "❌ ERROR: Some containers failed to start"
              echo "=== Docker Compose Logs ==="
              docker compose logs --tail=100
              echo "=== Docker Compose Status ==="
              docker compose ps -a
              exit 1
            fi
            
            echo "✅ Deployment finished"
            
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MINIAPP_URL: ${{ secrets.TELEGRAM_MINIAPP_URL }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
