server {
  listen 80;
  server_name 45-14-245-122.sslip.io;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name 45-14-245-122.sslip.io;

  ssl_certificate /etc/letsencrypt/live/45-14-245-122.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/45-14-245-122.sslip.io/privkey.pem;

  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://backend:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
