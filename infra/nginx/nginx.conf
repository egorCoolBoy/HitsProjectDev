server {
  listen 80;
  server_name 45-9-14-172.sslip.io;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name 45-9-14-172.sslip.io;

  ssl_certificate /etc/letsencrypt/live/45-9-14-172.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/45-9-14-172.sslip.io/privkey.pem;

  location / {
    proxy_pass http://splitapp-frontend:80/;
    proxy_set_header Host $host;
  }

  location /api/ {
    client_max_body_size 25M;
    proxy_pass http://splitapp-backend:8080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /hubs/ {
    proxy_pass http://splitapp-backend:8080/hubs/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
